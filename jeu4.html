<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Gammes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gammes</h1>

<button class="footer-btn secondary" id="homeBtn">← Accueil</button>

<div class="message">Choisis une note fondamentale et le type de gamme.</div>

<div class="note-grid" id="noteGrid"></div>

<div class="state-row" id="typeRow">
  <button class="state-btn selected" data-type="majeur">Majeur</button>
  <button class="state-btn" data-type="mineur">Mineur</button>
</div>

<div class="status" id="scaleLabelWrap" style="display:none;">
  <div class="chord-name idle" id="scaleLabel"></div>
</div>

<div class="keyboard" id="keyboard"></div>

<script src="common.js"></script>
<script>
const keyboardEl = document.getElementById('keyboard');
const keyEls = buildKeyboard(keyboardEl, null);

const noteGridEl = document.getElementById('noteGrid');
let chosenNote = null;
let chosenType = 'majeur';

noteNames.forEach((n, i)=>{
  const btn = document.createElement('div');
  btn.className = 'note-btn';
  btn.textContent = n;
  btn.dataset.note = n;
  btn.addEventListener('click', ()=>{
    noteGridEl.querySelectorAll('.note-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    chosenNote = i;
    drawScale();
  });
  noteGridEl.appendChild(btn);
});

document.querySelectorAll('#typeRow .state-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#typeRow .state-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    chosenType = btn.dataset.type;
    drawScale();
  });
});

function drawScale(){
  resetKeyColors(keyEls);
  if(chosenNote===null) return;
  const scaleNotes = getScaleNotes(chosenNote, chosenType);
  const rootNote = noteNames[chosenNote];
  const playedIdx = [];
  for(let idx=1; idx<=24; idx++){
    const note = idxToNote(idx);
    if(note === rootNote){
      keyEls[idx].classList.add('root');
      playedIdx.push(idx);
    } else if(scaleNotes.includes(note)){
      keyEls[idx].classList.add('selected');
      playedIdx.push(idx);
    }
  }
  playScaleSound(playedIdx);

  const scaleLabelWrap = document.getElementById('scaleLabelWrap');
  const scaleLabel = document.getElementById('scaleLabel');
  let mainLabel, relativeLabel;
  if(chosenType === 'majeur'){
    mainLabel = rootNote;
    relativeLabel = noteNames[(chosenNote+9)%12] + 'm';
  } else {
    mainLabel = rootNote + 'm';
    relativeLabel = noteNames[(chosenNote+3)%12];
  }
  scaleLabel.textContent = mainLabel + ' (' + relativeLabel + ')';
  scaleLabelWrap.style.display = 'block';
}

document.getElementById('homeBtn').addEventListener('click', ()=>{ window.location.href = 'index.html'; });
</script>

</body>
</html>
